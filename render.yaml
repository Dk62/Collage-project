services:
  - type: web
    name: placement-portal-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://your-frontend-domain.vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
